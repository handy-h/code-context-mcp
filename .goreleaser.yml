# GoReleaser configuration
# https://goreleaser.com
version: 2

project_name: code-context-mcp

before:
  hooks:
    - go mod tidy

builds:
  - id: code-context-mcp
    main: .
    binary: code-context-mcp
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    goarm:
      - 7
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    tags:
      - netgo
      - osusergo

archives:
  - id: default
    # format is deprecated, using default tar.gz format
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    files:
      - LICENSE
      - README.md
      - docs/
      - .env.example

checksum:
  name_template: 'checksums.txt'

snapshot:
  # name_template is deprecated, using default snapshot naming

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  prerelease: auto
  draft: false
  replace_existing_draft: true

dockers_v2:
  - image_templates:
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}:{{ .Version }}"
      - "ghcr.io/{{ .Env.GITHUB_REPOSITORY }}:latest"
    dockerfile: Dockerfile
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      org.opencontainers.image.title: "{{.ProjectName}}"
      org.opencontainers.image.description: "MCP server for AI coding assistants providing code context through semantic search, symbol lookup, and impact analysis"
      org.opencontainers.image.url: "https://github.com/{{.Env.GITHUB_REPOSITORY}}"
      org.opencontainers.image.source: "https://github.com/{{.Env.GITHUB_REPOSITORY}}"
      org.opencontainers.image.version: "{{.Version}}"
      org.opencontainers.image.created: "{{.Date}}"
      org.opencontainers.image.revision: "{{.Commit}}"
      org.opencontainers.image.licenses: "MIT"
    extra_files:
      - LICENSE
      - README.md
      - docs/
      - .env.example