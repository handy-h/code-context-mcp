name: Build

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: [ '1.25.x' ]
        include:
          - os: ubuntu-latest
            artifact_name: code-context-mcp-linux-amd64
            output_name: code-context-mcp
          - os: macos-latest
            artifact_name: code-context-mcp-darwin-amd64
            output_name: code-context-mcp
          - os: windows-latest
            artifact_name: code-context-mcp-windows-amd64.exe
            output_name: code-context-mcp.exe
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
        cache: true
        cache-dependency-path: go.sum

    - name: Build
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          export GOOS=linux
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          export GOOS=darwin
        else
          export GOOS=windows
        fi
        export GOARCH=amd64
        export CGO_ENABLED=0
        VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "v0.0.0-dev")
        go build -v -trimpath -ldflags="-s -w -X main.version=$VERSION" -o ${{ matrix.output_name }} .

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: ${{ matrix.output_name }}
        retention-days: 7

  multiarch:
    name: Multi-arch Build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ghcr.io/${{ github.repository }}:latest
          ghcr.io/${{ github.repository }}:${{ github.ref_name }}
        cache-from: type=gha
        cache-to: type=gha,mode=max